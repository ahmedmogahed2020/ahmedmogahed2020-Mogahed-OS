<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Mogahed OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/campaigns.css" />
  <link rel="stylesheet" href="css/knowledge.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="app-shell" id="appShell">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">م</div>
        <div>
          <p class="eyebrow">Personal Operating System</p>
          <h1>Mogahed OS</h1>
        </div>
      </div>
      <button class="icon-button" type="button" data-action="open-search" aria-label="بحث عام">⌕</button>
    </header>

    <main id="mainView" class="main-view" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="التنقل الرئيسي">
      <button type="button" data-route="home" class="nav-item active"><span>⌂</span><b>الرئيسية</b></button>
      <button type="button" data-route="goals" class="nav-item"><span>◎</span><b>الأهداف</b></button>
      <button type="button" data-route="projects" class="nav-item"><span>▦</span><b>المشاريع</b></button>
      <button type="button" data-route="tasks" class="nav-item"><span>☑</span><b>المهام</b></button>
      <button type="button" data-route="knowledge" class="nav-item"><span>◈</span><b>المعرفة</b></button>
      <button type="button" data-route="more" class="nav-item"><span>⋯</span><b>المزيد</b></button>
    </nav>

    <div class="quick-actions" id="quickActions" aria-hidden="true">
      <button type="button" data-action="open-task-modal">مهمة</button>
      <button type="button" data-action="open-knowledge-modal">معرفة</button>
      <button type="button" data-action="open-emergency">طوارئ</button>
      <button type="button" data-action="open-search">بحث</button>
      <button type="button" data-action="open-campaign-modal">حملة</button>
    </div>
    <button class="fab" id="mainFab" type="button" data-action="toggle-quick-actions" aria-label="الإجراءات السريعة">＋</button>
  </div>

  <div id="modalRoot" class="modal-root" aria-live="polite"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
